# Reference configuration for creating Multica agents.
# Multica UI fields and CLI flags may differ by version; treat this as the desired state.
#
# verification-before-completion is a completion gate for agents that claim
# implementation, test, review, or release readiness. Use it before claiming
# done, ready for review, or ready to merge. It is intentionally not attached
# to OpenAI-scoper, which owns intake and handoff instead of implementation
# completion.
#
# context-pack is attached to scoping, implementation, test, security, and
# release agents that may need to preserve compact durable handoff, review, or
# resume context. It does not create runtime storage or modify workspace state.
#
# The name fields below are the Governance bootstrap workspace agent names. The
# system_prompt_file paths are repo-local prompt filenames only. The retained
# codex-*.md filenames do not define workspace agent names; they are an
# explicit compatibility mapping to the existing prompt files. Treat each
# system_prompt_file value as a literal path; do not infer it from the agent
# name or from the prompt file basename.

agents:
  - name: OpenAI-scoper
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: Clarify requirements, split issues, route work, write briefs. Does not modify code unless explicitly asked.
    skills:
      - spec-first-intake
      - architecture-review
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-scoper.md

  - name: OpenAI-fullstack
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: Implement low/medium-risk vertical slices with tests when a later issue approves runtime work.
    skills:
      - tdd-vertical-slice
      - systematic-debugging
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-fullstack.md

  - name: OpenAI-frontend
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: UI, accessibility, frontend state, and frontend tests when a later issue introduces UI scope.
    skills:
      - tdd-vertical-slice
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-frontend.md

  - name: OpenAI-backend
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: APIs, data model, service logic, and backend tests when a later issue introduces backend scope.
    skills:
      - tdd-vertical-slice
      - security-pr-review
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-backend.md

  - name: OpenAI-test
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: Test gaps, flaky tests, CI failures, regression tests.
    skills:
      - tdd-vertical-slice
      - systematic-debugging
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-test.md

  # Security review stays private because it handles security-sensitive review
  # routing. Do not broaden visibility as part of name alignment.
  # context-pack output from this private agent must remain private, or be
  # explicitly redacted before any workspace-visible comment.
  - name: OpenAI-security-reviewer
    tool: codex
    visibility: private
    concurrency_limit: 1
    purpose: Security review and bounded security fixes. Default to review-only.
    skills:
      - security-pr-review
      - architecture-review
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-security-reviewer.md

  - name: OpenAI-release-manager
    tool: codex
    visibility: workspace
    concurrency_limit: 1
    purpose: Release notes, migration notes, changelog, release readiness.
    skills:
      - release-notes-drafter
      - systematic-debugging
      - verification-before-completion
      - context-pack
    system_prompt_file: multica/agent-system-prompts/codex-release-manager.md
