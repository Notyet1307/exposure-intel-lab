name: DeepSeek pull request review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: deepseek-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --no-ext-diff --unified=80 "$BASE_SHA" "$HEAD_SHA" > pr.diff
          head -c 60000 pr.diff > pr-truncated.diff

      - name: Run DeepSeek review
        id: deepseek_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set +e
          python3 .github/scripts/deepseek_pr_review.py \
            pr-truncated.diff \
            .github/codex/prompts/review.md \
            deepseek-review.md
          review_exit_code=$?
          set -e
          echo "exit_code=$review_exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check review output
        id: review_output
        if: ${{ always() }}
        run: |
          if [ -f deepseek-review.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        if: ${{ always() && steps.review_output.outputs.exists == 'true' }}
        uses: actions/github-script@v7
        env:
          AI_REVIEW_MARKER: "<!-- ai-review:deepseek -->"
          REVIEW_BODY: ${{ github.workspace }}/deepseek-review.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const marker = process.env.AI_REVIEW_MARKER;
            const body = fs.readFileSync(process.env.REVIEW_BODY, "utf8");
            if (!body.includes(marker)) {
              throw new Error(`DeepSeek review body is missing stable marker: ${marker}`);
            }

            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" &&
              comment.user?.login === "github-actions[bot]" &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      - name: Fail DeepSeek review check
        if: ${{ always() && steps.deepseek_review.outputs.exit_code != '0' }}
        env:
          DEEPSEEK_REVIEW_EXIT_CODE: ${{ steps.deepseek_review.outputs.exit_code }}
        run: exit "${DEEPSEEK_REVIEW_EXIT_CODE:-1}"
