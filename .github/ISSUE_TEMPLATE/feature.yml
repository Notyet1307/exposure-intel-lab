name: Feature request
about: Define a feature as an agent-ready vertical slice
labels: ["type:feature", "needs-triage"]
body:
  - type: input
    id: goal
    attributes:
      label: Goal
      description: What user-visible behavior should change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Product, technical, and domain context.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of observable outcomes.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - low
        - medium
        - high
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      value: |
        - 
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      value: |
        - 
